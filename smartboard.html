<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>
        Operation Hunt: 2×2 Addition — Smart Board
    </title>

    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/smartboard.css">
</head>

<body class="smartboard-page">

    <main class="smartboard-shell">

        <!-- TOP HEADER -->
        <header class="smartboard-topbar">

            <!-- BRAND -->
            <section class="smartboard-brand-panel">

                <div class="brand-icon" aria-hidden="true">
                    🎯
                </div>

                <div class="smartboard-brand-copy">

                    <div class="brand-operation-line">
                        OPERATION
                    </div>

                    <div class="brand-hunt-line">

                        <span class="brand-hunt">
                            HUNT
                        </span>

                        <span class="brand-mode">
                            2×2 Addition
                        </span>

                    </div>

                </div>

            </section>

            <!-- INSTRUCTIONS -->
            <section class="smartboard-instruction-panel">

                <span class="instruction-icon" aria-hidden="true">
                    💡
                </span>

                <p>
                    Find two numbers that add to another number
                </p>

            </section>

            <!-- ACTIVE PLAYER -->
            <section class="smartboard-active-card">

                <span>
                    ACTIVE PLAYER
                </span>

                <strong id="active-player-name">
                    Player 1
                </strong>

            </section>

            <!-- SESSION STATUS -->
            <section class="status-card smartboard-status-card">

                <span>
                    SESSION STATUS
                </span>

                <strong id="session-status">
                    WAITING FOR PUZZLE
                </strong>

            </section>

        </header>

        <!-- MAIN CONTENT -->
        <section class="smartboard-content">

            <!-- LEFT SIDE -->
            <aside class="smartboard-left-column">

                <!-- SCOREBOARD -->
                <section class="scoreboard-card smartboard-scoreboard">

                    <h2>
                        <span aria-hidden="true">
                            🏆
                        </span>

                        Score Card
                    </h2>

                    <div class="scoreboard-header">
                        <span>Player</span>
                        <span>Score</span>
                        <span>Turn</span>
                    </div>

                    <div id="scoreboard"></div>

                </section>

                <!-- TIMER -->
                <section id="timer-card" class="timer-card timer-disabled smartboard-timer">

                    <div class="timer-header">

                        <h2>
                            <span aria-hidden="true">
                                ⏱
                            </span>

                            Round Timer
                        </h2>

                        <strong id="timer-toggle-label" class="smartboard-timer-state">
                            OFF
                        </strong>

                    </div>

                    <div id="timer-ring" class="timer-ring">

                        <div class="timer-ring-center">

                            <span class="timer-clock-icon" aria-hidden="true">
                                ◷
                            </span>

                            <strong id="timer-display">
                                00:30
                            </strong>

                            <span id="timer-caption">
                                TIMER OFF
                            </span>

                        </div>

                    </div>

                </section>

            </aside>

            <!-- RIGHT SIDE -->
            <section class="smartboard-right-column">

                <!-- PUZZLE -->
                <section class="puzzle-section smartboard-puzzle-section">

                    <div id="puzzle-board" class="puzzle-board smartboard-puzzle-board">

                        <button class="puzzle-cell" data-index="0" type="button"
                            aria-label="Top-left puzzle number"></button>

                        <button class="puzzle-cell" data-index="1" type="button"
                            aria-label="Top-right puzzle number"></button>

                        <button class="puzzle-cell" data-index="2" type="button"
                            aria-label="Bottom-left puzzle number"></button>

                        <button class="puzzle-cell" data-index="3" type="button"
                            aria-label="Bottom-right puzzle number"></button>

                    </div>

                    <!-- EQUATION -->
                    <div class="equation-card smartboard-equation">

                        <span>
                            EQUATION
                        </span>

                        <strong id="equation-display">
                            Hidden
                        </strong>

                    </div>

                </section>

                <!-- SUMMARY -->
                <section class="session-summary smartboard-summary">

                    <article>

                        <span class="summary-icon puzzle-icon">
                            🧩
                        </span>

                        <div>
                            <span>Puzzles</span>
                            <strong id="total-puzzles">0</strong>
                        </div>

                    </article>

                    <article>

                        <span class="summary-icon attempts-icon">
                            🎯
                        </span>

                        <div>
                            <span>Attempts</span>
                            <strong id="total-attempts">0</strong>
                        </div>

                    </article>

                    <article>

                        <span class="summary-icon correct-icon">
                            ✓
                        </span>

                        <div>
                            <span>Correct</span>
                            <strong id="total-correct">0</strong>
                        </div>

                    </article>

                    <article>

                        <span class="summary-icon accuracy-icon">
                            ▥
                        </span>

                        <div>
                            <span>Accuracy</span>
                            <strong id="class-accuracy">—</strong>
                        </div>

                    </article>

                </section>

            </section>

        </section>

    </main>

    <script src="js/shared-state.js"></script>
    <script src="js/puzzle-engine.js"></script>
    <script src="js/smartboard.js"></script>

</body>

</html>
