<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Operation Hunt: 2×2 Addition</title>

    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <main class="game-shell">

        <!-- TEACHER CONTROLS -->
        <aside class="control-panel">

            <header class="brand">
                <h1>OPERATION<br>HUNT</h1>
                <p class="subtitle">2×2 Addition</p>
            </header>

            <section class="status-card">
                <span>SESSION STATUS</span>

                <strong id="session-status">
                    WAITING FOR PUZZLE
                </strong>
            </section>

            <div class="control-buttons">

                <button id="new-puzzle-button" class="control-button blue" type="button">
                    New Puzzle
                </button>

                <button id="reveal-button" class="control-button purple" type="button">
                    Reveal Answer
                </button>

                <button id="previous-player-button" class="control-button orange" type="button">
                    Previous Player
                </button>

                <button id="next-player-button" class="control-button green" type="button">
                    Next Player
                </button>

                <button id="reset-session-button" class="control-button red" type="button">
                    Reset Session
                </button>

                <button id="reset-board-button" class="control-button gray" type="button">
                    Reset Board
                </button>

            </div>

            <section class="settings-panel">
                <h2>Game Settings</h2>

                <label for="player-count">
                    Players
                </label>

                <select id="player-count">
                    <option value="1">1</option>
                    <option value="2" selected>2</option>
                    <option value="3">3</option>
                    <option value="4">4</option>
                    <option value="5">5</option>
                    <option value="6">6</option>
                </select>

                <label for="minimum-number">
                    Minimum Number
                </label>

                <input id="minimum-number" type="number" min="1" value="1">

                <label for="maximum-number">
                    Maximum Number
                </label>

                <input id="maximum-number" type="number" min="2" value="20">
            </section>

        </aside>

        <!-- MAIN GAME DISPLAY -->
        <section class="game-display">

            <header class="game-header">

                <p class="instructions">
                    Find two numbers that add to another number
                </p>

                <div class="active-player-card">
                    <span>ACTIVE PLAYER</span>

                    <strong id="active-player-name">
                        Player 1
                    </strong>
                </div>

            </header>

            <section class="main-game-area">

                <!-- SCOREBOARD AND TIMER -->
                <div class="left-game-column">

                    <section class="scoreboard-card">

                        <h2>Score Card</h2>

                        <div class="scoreboard-header">
                            <span>Player</span>
                            <span>Score</span>
                            <span>Turn</span>
                        </div>

                        <div id="scoreboard"></div>

                    </section>

                    <!-- ROUND TIMER -->
                    <section id="timer-card" class="timer-card timer-disabled">

                        <div class="timer-header">
                            <h2>⏱ Round Timer</h2>

                            <label class="timer-switch">
                                <input id="timer-toggle" type="checkbox">

                                <span class="switch-track">
                                    <span class="switch-knob"></span>
                                </span>

                                <strong id="timer-toggle-label">
                                    OFF
                                </strong>
                            </label>
                        </div>

                        <div class="timer-settings-row">
                            <label for="timer-duration">
                                Duration
                            </label>

                            <select id="timer-duration">
                                <option value="5">5 Seconds</option>
                                <option value="10">10 Seconds</option>
                                <option value="15">15 Seconds</option>
                                <option value="30" selected>30 Seconds</option>
                                <option value="45">45 Seconds</option>
                                <option value="60">60 Seconds</option>
                            </select>
                        </div>

                        <div id="timer-ring" class="timer-ring">
                            <div class="timer-ring-center">
                                <span class="timer-clock-icon">◷</span>

                                <strong id="timer-display">
                                    00:30
                                </strong>

                                <span id="timer-caption">
                                    TIMER OFF
                                </span>
                            </div>
                        </div>

                    </section>

                </div>

                <!-- PUZZLE -->
                <section class="puzzle-section">

                    <div id="puzzle-board" class="puzzle-board">

                        <button class="puzzle-cell" data-index="0" type="button"
                            aria-label="Top-left puzzle number"></button>

                        <button class="puzzle-cell" data-index="1" type="button"
                            aria-label="Top-right puzzle number"></button>

                        <button class="puzzle-cell" data-index="2" type="button"
                            aria-label="Bottom-left puzzle number"></button>

                        <button class="puzzle-cell" data-index="3" type="button"
                            aria-label="Bottom-right puzzle number"></button>

                    </div>

                    <div class="equation-card">
                        <span>EQUATION</span>

                        <strong id="equation-display">
                            Hidden
                        </strong>
                    </div>

                </section>

            </section>

            <!-- SESSION SUMMARY -->
            <section class="session-summary">

                <article>
                    <span class="summary-icon puzzle-icon">🧩</span>

                    <div>
                        <span>Puzzles</span>
                        <strong id="total-puzzles">0</strong>
                    </div>
                </article>

                <article>
                    <span class="summary-icon attempts-icon">🎯</span>

                    <div>
                        <span>Attempts</span>
                        <strong id="total-attempts">0</strong>
                    </div>
                </article>

                <article>
                    <span class="summary-icon correct-icon">✓</span>

                    <div>
                        <span>Correct</span>
                        <strong id="total-correct">0</strong>
                    </div>
                </article>

                <article>
                    <span class="summary-icon accuracy-icon">▥</span>

                    <div>
                        <span>Accuracy</span>
                        <strong id="class-accuracy">—</strong>
                    </div>
                </article>

            </section>

        </section>

    </main>

    <script src="js/game-engine.js"></script>
</body>

</html>
